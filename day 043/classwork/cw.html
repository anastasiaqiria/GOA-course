<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo selectors</title>
    <link rel="stylesheet" href="cw.css">
</head>
<body>
    <a id="tt" href="tiktok.com">Click to go to tiktok</a><br>
    <a id="yt" href="youtube.com">Click to go to instagram</a><br>
    <a id="insta" href="facebook.com">Click to go to facebook</a><br>
    <a id="chess" href="chess.com">Click to go to Chess com</a>
</body>
</html>

<!-- pseudo selector-ები გვეხმარებიან რომ ვაკონტროლოთ ელემენტები მათ მდგომარეობის მიხედვით სხვადასხვა მდგომარეობები
pseudo selector-ები:
1.Active - როდესაც დაჭერილი გვაქვს ელემენტზე ხელი მაგრამ ჯერ არ აგვიშვია ამ ელემენტზე დაჭერილი ხელი
2.Hover - როდესაც მაუსი ელემენტზე არის მაგამ არ აწვება
3.Visited - (link) როდესაც მომხმარებელუ უკვე ესტუმრა ამ ლინკს
4.Link - (link) როდესაც მომხმარებელი ჯერ არ გადასულა ამ ლინკზე -->
