<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>

        <h1>User Registration Page</h1>

        <label for="Name">Enter Your Full Name:</label>
        <input type="name"><br><br>

        <label for="Email">Enter Your Email:</label>
        <input type="email"><br><br>

        <label for="Password">Enter Your Password:</label>
        <input type="password"><br><br>

        <label for="Password">Confirm your Password:</label>
        <input type="password"><br><br>


        <p>Enter your Gender</p>
        <label for="r1">Female</label>
        <input type="radio" id="r1"><br>

        <label for="r2">Male</label>
        <input type="radio" id="r2"><br>

        <label for="r3">Other</label>
        <input type="radio" id="r3"><br><br>

        <label for="Address">Enter Your Adress:</label>
        <input type="address"><br><br>

        <input type="submit" value="Sign-up">

    </form>
</body>
</html>
